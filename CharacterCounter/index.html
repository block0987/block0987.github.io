<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" type="text/css" href="../var.css">
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="CharacterCounter.js"></script>
    <link rel="manifest" href="manifest.json">

    <link rel="shortcut icon" type="image/svg+xml" href="../favicon.svg">
    <title>文字数カウンタ―</title>
    <meta name="description" content="文字数カウンタ― | 文字数を数えたり、スペース・改行を削除したりできます。">
    <meta name="keywords" content="文字数カウンタ―,文字数カウント,スペース削除">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GJZDYBH0SM"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        
        gtag('config', 'G-GJZDYBH0SM');
    </script>
</head>
<body>
    <main>
        <textarea id="textarea" placeholder="ここにテキストを入力" onkeyup="countCharacters(value);"></textarea>
        <div class="CounterContainer">
            <div class="Counterbox">
                <p id="CharCount">文字数: 0</p>
            </div>
            <div class="Counterbox">
                <p id="NoSpaceCount">文字数(空白を除く): 0</p>
            </div>
            <div class="Counterbox">
                <p id="SpaceCount">スペース: 0</p>
            </div>
            <div class="Counterbox">
                <p id="LineCount">改行: 0</p>
            </div>
        </div>
        <div class="ToolContainer">
            <button class="ToolButton" onclick="copy();">コピー</button>
            <button class="ToolButton" onclick="convertLower();">小文字</button>
            <button class="ToolButton" onclick="convertUpper();">大文字</button>
            <button class="ToolButton" onclick="deleteSpace();">スペース削除</button>
            <button class="ToolButton" onclick="deleteLine();">改行削除</button>
            <button class="ToolButton" onclick="reset();">リセット</button>
        </div>
    </main>
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(function(registration) {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
        }).catch(function(err) {
            console.log('ServiceWorker registration failed: ', err);
        });
    }
    </script>
</body>
</html>
